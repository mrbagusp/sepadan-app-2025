name: sepadan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  firebase_messaging: ^16.1.0
  go_router: ^17.0.1
  provider: ^6.1.5+1
  google_fonts: ^7.0.0
  google_sign_in: ^6.2.1
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  flutter_card_swiper: ^7.2.0
  midtrans_sdk: ^1.2.0
  firebase_ai: ^3.6.1
  swipe_cards: ^2.0.0+1
  intl: ^0.19.0
  http: ^1.2.2
  rxdart: ^0.27.7
  fluttertoast: ^8.2.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 # 🔥 Tambahan untuk generate icon

# 🔥 Konfigurasi Ikon Aplikasi
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
